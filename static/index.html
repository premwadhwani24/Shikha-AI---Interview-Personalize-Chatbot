<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shiksha AI — Interview Coach</title>

  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

  <!-- Optional: include a small polyfill for speech recognition if targeting older browsers -->

  <!-- Local styles (create style.css) -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

  <div class="max-w-7xl mx-auto p-4 grid grid-cols-12 gap-4">

    <!-- Sidebar -->
    <aside class="col-span-3 bg-gray-800/60 rounded-2xl p-4 flex flex-col gap-4 h-[86vh]">
      <div class="flex items-center gap-3">
        <img src="shiii.png" alt="Shiksha AI" class="w-12 h-12 rounded-full object-cover">
        <div>
          <h1 class="text-lg font-bold">Shiksha AI</h1>
          <p class="text-xs text-gray-300">Virtual Interview Coach</p>
        </div>
      </div>

      <div class="flex gap-2">
        <button id="newSession" class="flex-1 bg-green-600 hover:bg-green-500 rounded-full px-3 py-2 text-sm font-semibold">New Session</button>
        <button id="loadSession" class="flex-1 bg-gray-700 hover:bg-gray-600 rounded-full px-3 py-2 text-sm">Load</button>
      </div>

      <div>
        <label class="text-xs text-gray-300">Profile / Company</label>
        <input id="companyInput" class="w-full mt-1 p-2 rounded-md bg-gray-900 text-sm" placeholder="e.g. Google, Microsoft" />
      </div>

      <div>
        <label class="text-xs text-gray-300">Job Type</label>
        <select id="jobType" class="w-full mt-1 p-2 rounded-md bg-gray-900 text-sm">
          <option value="auto">Auto — ask clarifying Qs</option>
          <option value="technical">Technical</option>
          <option value="nontechnical">Non-Technical</option>
        </select>
      </div>

      <div>
        <label class="text-xs text-gray-300">Role (optional)</label>
        <input id="roleInput" class="w-full mt-1 p-2 rounded-md bg-gray-900 text-sm" placeholder="e.g. Data Analyst" />
      </div>

      <div class="flex flex-col gap-2 mt-auto">
        <button id="startInterview" class="w-full bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg font-semibold">Start Interview</button>
        <button id="settingsBtn" class="w-full bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg">Settings</button>
      </div>

    </aside>

    <!-- Main content -->
    <main class="col-span-6 bg-gradient-to-b from-slate-800/40 to-slate-900/40 rounded-2xl p-4 h-[86vh] flex flex-col">

      <!-- Avatar + webcam row -->
      <div class="flex gap-4 items-start">
        <!-- Avatar canvas for animated HR persona -->
        <div class="w-64 h-64 bg-gray-800/30 rounded-xl p-2 flex flex-col items-center justify-center">
          <canvas id="avatarCanvas" width="240" height="240" class="rounded-lg bg-transparent"></canvas>
          <div class="text-center text-sm text-gray-300 mt-2">Virtual HR</div>
        </div>

        <!-- Webcam preview & suggestions -->
        <div class="flex-1 bg-gray-800/30 rounded-xl p-3">
          <div class="flex items-center justify-between">
            <h3 class="font-semibold">Self view & behaviour</h3>
            <div class="text-xs text-gray-300">Eye-contact & posture monitoring</div>
          </div>

          <div class="mt-3 grid grid-cols-2 gap-3">
            <video id="webcam" autoplay muted playsinline class="w-full h-40 rounded-md object-cover bg-black"></video>
            <div class="p-2 rounded-md bg-gray-900/40 flex flex-col justify-between">
              <div>
                <p id="eyeStatus" class="text-sm">Eye contact: <span class="font-medium">Unknown</span></p>
                <p id="postureStatus" class="text-sm mt-1">Posture: <span class="font-medium">Unknown</span></p>
              </div>
              <button id="calibrateBtn" class="mt-3 w-full bg-indigo-600 hover:bg-indigo-500 py-2 rounded-md text-sm">Calibrate</button>
            </div>
          </div>

        </div>
      </div>

      <!-- Conversation/Transcript -->
      <div id="transcript" class="mt-4 flex-1 overflow-auto p-3 rounded-xl bg-gray-900/40">
        <!-- Chat messages will be appended here -->
        <div id="messages" class="flex flex-col gap-3"></div>
      </div>

      <!-- Input controls -->
      <div class="mt-3 flex gap-2 items-center">
        <button id="micBtn" class="p-3 bg-red-600 hover:bg-red-500 rounded-full"><i class="fa fa-microphone"></i></button>
        <input id="userInput" type="text" placeholder="Answer the question or type something..." class="flex-1 p-3 rounded-full bg-gray-800/60 focus:outline-none" />
        <button id="sendBtn" class="px-4 py-2 rounded-full bg-green-600 hover:bg-green-500">Send</button>
      </div>

    </main>

    <!-- Right panel: Analytics, feedback and history -->
    <aside class="col-span-3 bg-gray-800/60 rounded-2xl p-4 h-[86vh] flex flex-col gap-4">
      <h3 class="font-semibold">Realtime Feedback</h3>

      <div class="grid grid-cols-2 gap-3">
        <div class="p-3 rounded-lg bg-gray-900/40">
          <p class="text-xs text-gray-400">Score</p>
          <div id="score" class="text-3xl font-bold mt-2">—</div>
        </div>
        <div class="p-3 rounded-lg bg-gray-900/40">
          <p class="text-xs text-gray-400">Fluency</p>
          <div id="fluency" class="text-3xl font-bold mt-2">—</div>
        </div>
      </div>

      <div class="mt-2 p-3 rounded-lg bg-gray-900/40 flex-1 overflow-auto">
        <h4 class="text-sm font-semibold">Actionable Feedback</h4>
        <ul id="feedbackList" class="mt-2 text-sm text-gray-300 list-disc pl-5">
          <!-- Feedback items -->
        </ul>
      </div>

      <div class="mt-2">
        <button id="downloadReport" class="w-full bg-blue-600 hover:bg-blue-500 py-2 rounded-md">Export Report</button>
      </div>

    </aside>

  </div>

  <!-- Simple accessible alert area -->
  <div id="toast" class="fixed bottom-6 right-6 p-3 bg-gray-800/80 rounded-md hidden" role="status" aria-live="polite"></div>

  <!-- App script -->
  <script type="module" src="app.js"></script>
</body>
</html>
